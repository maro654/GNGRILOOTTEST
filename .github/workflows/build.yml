name: Build Plugin

on:
push:
branches:
- main

jobs:
build:
runs-on: ubuntu-latest

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Java
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: 21

  - name: Build
    run: mvn package

  - name: Upload Jar
    uses: actions/upload-artifact@v4
    with:
      name: GNGRILOOTTEST
      path: target/*.jar
